version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: vaultai-ollama
    ports:
      - "11434:11434"
    volumes:
      - ~/.ollama:/root/.ollama
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vaultai-backend
    ports:
      - "8000:8000"
    depends_on:
      - ollama
    env_file:
      - .env
    volumes:
      - ./backend:/backend
      - ./chroma_db:/backend/chroma_db
    restart: unless-stopped
